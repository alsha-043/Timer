<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>집중 타이머</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --study-bg: #0d0d0f;
      --study-accent: #c8f07a;
      --study-text: #e8e8e0;
      --study-muted: #4a4a52;
      --study-surface: #18181c;
      --rest-bg: #0a0f1a;
      --rest-accent: #7ab8f0;
      --rest-text: #d8e8f0;
      --rest-muted: #2a3a4a;
      --rest-surface: #0f1620;
      --radius: 20px;
      --current-bg: var(--study-bg);
      --current-accent: var(--study-accent);
      --current-text: var(--study-text);
      --current-muted: var(--study-muted);
      --current-surface: var(--study-surface);
    }

    html, body {
      height: 100%;
      min-height: 100svh;
      overflow: hidden;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--current-bg);
      color: var(--current-text);
      transition: background 0.8s ease, color 0.8s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      position: relative;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      width: 60vmax;
      height: 60vmax;
      border-radius: 50%;
      background: radial-gradient(circle, var(--current-accent) 0%, transparent 70%);
      opacity: 0.04;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      pointer-events: none;
      z-index: 0;
      transition: background 0.8s ease;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Header */
    .header {
      text-align: center;
    }

    .mode-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--current-accent);
      transition: color 0.8s ease;
      margin-bottom: 4px;
    }

    .app-title {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: var(--current-text);
      transition: color 0.8s ease;
    }

    /* Time Input Section */
    .input-section {
      background: var(--current-surface);
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: background 0.8s ease, border-color 0.8s ease;
    }

    .input-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
    }

    .input-row + .input-row {
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .input-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--current-muted);
      transition: color 0.8s ease;
    }

    .time-input-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .time-field {
      width: 48px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: var(--current-text);
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      font-weight: 500;
      text-align: center;
      padding: 8px 4px;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.3s, background 0.3s;
    }

    .time-field:focus {
      border-color: var(--current-accent);
      background: rgba(255,255,255,0.08);
    }

    .time-sep {
      font-size: 14px;
      color: var(--current-muted);
      font-weight: 300;
    }

    .time-unit {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--current-muted);
      transition: color 0.8s ease;
    }

    /* Timer Display */
    .timer-display {
      text-align: center;
      padding: 10px 0;
      position: relative;
    }

    .timer-ring-wrap {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 0 auto;
    }

    .timer-svg {
      width: 220px;
      height: 220px;
      transform: rotate(-90deg);
    }

    .ring-track {
      fill: none;
      stroke: rgba(255,255,255,0.05);
      stroke-width: 3;
    }

    .ring-progress {
      fill: none;
      stroke: var(--current-accent);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 628;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.8s ease;
      filter: drop-shadow(0 0 6px var(--current-accent));
    }

    .timer-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .timer-digits {
      font-family: 'DM Serif Display', serif;
      font-size: 52px;
      line-height: 1;
      color: var(--current-text);
      letter-spacing: -0.02em;
      transition: color 0.8s ease;
    }

    .timer-sub {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--current-muted);
      margin-top: 6px;
      text-transform: uppercase;
      transition: color 0.8s ease;
    }

    /* Controls */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-main {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      background: var(--current-accent);
      color: #0a0a0c;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.8s ease;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }

    .btn-main::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.15);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .btn-main:active::after { opacity: 1; }
    .btn-main:active { transform: scale(0.97); }

    .btn-secondary {
      width: 100%;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      background: transparent;
      color: var(--current-muted);
      transition: color 0.3s, border-color 0.3s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-secondary:active { transform: scale(0.97); }

    /* Choice overlay */
    .choice-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .choice-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .choice-card {
      width: 100%;
      max-width: 380px;
      background: #1a1a1e;
      border-radius: 28px 28px 0 0;
      padding: 32px 24px 40px;
      border-top: 1px solid rgba(255,255,255,0.1);
      transform: translateY(100%);
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .choice-overlay.visible .choice-card {
      transform: translateY(0);
    }

    .choice-title {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      text-align: center;
      color: #e8e8e0;
      margin-bottom: 6px;
    }

    .choice-sub {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: #4a4a52;
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .choice-buttons {
      display: flex;
      gap: 12px;
    }

    .choice-btn {
      flex: 1;
      padding: 20px 12px;
      border: none;
      border-radius: 18px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: transform 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .choice-btn:active { transform: scale(0.95); }

    .choice-btn.study {
      background: #c8f07a;
      color: #0a0a0c;
    }

    .choice-btn.rest {
      background: #7ab8f0;
      color: #0a0a0c;
    }

    .choice-icon {
      font-size: 26px;
      line-height: 1;
    }

    /* Session log */
    .session-log {
      background: var(--current-surface);
      border-radius: var(--radius);
      padding: 16px 20px;
      border: 1px solid rgba(255,255,255,0.04);
      transition: background 0.8s ease;
      max-height: 100px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .log-title {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--current-muted);
      margin-bottom: 10px;
      transition: color 0.8s ease;
    }

    .log-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--current-muted);
      padding: 3px 0;
      transition: color 0.8s ease;
    }

    .log-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .log-dot.study { background: #c8f07a; }
    .log-dot.rest { background: #7ab8f0; }

    .log-left {
      display: flex;
      align-items: center;
    }

    .log-empty {
      font-size: 11px;
      color: var(--current-muted);
      text-align: center;
      padding: 4px 0;
      transition: color 0.8s ease;
    }

    /* Mode transition */
    body.rest-mode {
      --current-bg: var(--rest-bg);
      --current-accent: var(--rest-accent);
      --current-text: var(--rest-text);
      --current-muted: var(--rest-muted);
      --current-surface: var(--rest-surface);
    }

    /* Pulse animation when running */
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.04; }
      50% { opacity: 0.08; }
    }

    body.running::after {
      animation: pulse-glow 3s ease-in-out infinite;
    }

    /* Notification badge */
    .finished-badge {
      display: inline-block;
      background: var(--current-accent);
      color: #0a0a0c;
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 3px 10px;
      border-radius: 20px;
      margin-left: 8px;
      vertical-align: middle;
      font-weight: 500;
      transition: background 0.8s;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="mode-label" id="modeLabel">공부 모드</div>
      <div class="app-title">집중 타이머</div>
    </div>

    <!-- Time input -->
    <div class="input-section" id="inputSection">
      <div class="input-row">
        <span class="input-label">📚 공부</span>
        <div class="time-input-group">
          <input class="time-field" id="studyMin" type="number" min="0" max="99" value="25" inputmode="numeric" />
          <span class="time-sep">:</span>
          <input class="time-field" id="studySec" type="number" min="0" max="59" value="00" inputmode="numeric" />
          <span class="time-unit">mm:ss</span>
        </div>
      </div>
      <div class="input-row">
        <span class="input-label">🌙 휴식</span>
        <div class="time-input-group">
          <input class="time-field" id="restMin" type="number" min="0" max="99" value="05" inputmode="numeric" />
          <span class="time-sep">:</span>
          <input class="time-field" id="restSec" type="number" min="0" max="59" value="00" inputmode="numeric" />
          <span class="time-unit">mm:ss</span>
        </div>
      </div>
    </div>

    <!-- Ring timer -->
    <div class="timer-display">
      <div class="timer-ring-wrap">
        <svg class="timer-svg" viewBox="0 0 220 220">
          <circle class="ring-track" cx="110" cy="110" r="100"/>
          <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="100"/>
        </svg>
        <div class="timer-inner">
          <div class="timer-digits" id="timerDigits">25:00</div>
          <div class="timer-sub" id="timerSub">대기 중</div>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn-main" id="mainBtn" onclick="handleMain()">▶ 공부 시작</button>
      <button class="btn-secondary" id="resetBtn" onclick="handleReset()">초기화</button>
    </div>

    <!-- Session log -->
    <div class="session-log">
      <div class="log-title">오늘의 기록</div>
      <div id="logList">
        <div class="log-empty">아직 기록이 없어요</div>
      </div>
    </div>
  </div>

  <!-- Choice overlay -->
  <div class="choice-overlay" id="choiceOverlay">
    <div class="choice-card">
      <div class="choice-title">타이머 종료!</div>
      <div class="choice-sub" id="choiceSub">다음 세션을 선택하세요</div>
      <div class="choice-buttons">
        <button class="choice-btn study" onclick="chooseSession('study')">
          <span class="choice-icon">📚</span>
          <span>공부</span>
        </button>
        <button class="choice-btn rest" onclick="chooseSession('rest')">
          <span class="choice-icon">🌙</span>
          <span>휴식</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    // ─── State ───────────────────────────────────────────────
    let totalSeconds = 0;
    let remainingSeconds = 0;
    let intervalId = null;
    let isRunning = false;
    let currentMode = 'study'; // 'study' | 'rest'
    let sessionLog = [];
    let sessionStartTime = null;

    const CIRCUMFERENCE = 2 * Math.PI * 100; // 628.3

    // ─── DOM refs ────────────────────────────────────────────
    const body = document.body;
    const modeLabel = document.getElementById('modeLabel');
    const timerDigits = document.getElementById('timerDigits');
    const timerSub = document.getElementById('timerSub');
    const ringProgress = document.getElementById('ringProgress');
    const mainBtn = document.getElementById('mainBtn');
    const resetBtn = document.getElementById('resetBtn');
    const inputSection = document.getElementById('inputSection');
    const choiceOverlay = document.getElementById('choiceOverlay');
    const choiceSub = document.getElementById('choiceSub');
    const logList = document.getElementById('logList');

    // ─── Init ────────────────────────────────────────────────
    ringProgress.style.strokeDasharray = CIRCUMFERENCE;
    ringProgress.style.strokeDashoffset = 0;
    updateDigits(getInputSeconds('study'));

    function getInputSeconds(mode) {
      const minEl = document.getElementById(mode === 'study' ? 'studyMin' : 'restMin');
      const secEl = document.getElementById(mode === 'study' ? 'studySec' : 'restSec');
      const m = Math.max(0, parseInt(minEl.value) || 0);
      const s = Math.max(0, Math.min(59, parseInt(secEl.value) || 0));
      return m * 60 + s;
    }

    function updateDigits(secs) {
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      timerDigits.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function updateRing(remaining, total) {
      if (total === 0) { ringProgress.style.strokeDashoffset = 0; return; }
      const offset = CIRCUMFERENCE * (1 - remaining / total);
      ringProgress.style.strokeDashoffset = offset;
    }

    // ─── Input sync ──────────────────────────────────────────
    ['studyMin','studySec','restMin','restSec'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        if (!isRunning && currentMode === 'study') {
          updateDigits(getInputSeconds('study'));
          updateRing(getInputSeconds('study'), getInputSeconds('study'));
        }
      });
    });

    // ─── Main button ─────────────────────────────────────────
    function handleMain() {
      if (!isRunning) {
        startTimer();
      } else {
        pauseTimer();
      }
    }

    function startTimer() {
      if (remainingSeconds === 0 || remainingSeconds === totalSeconds && totalSeconds === 0) {
        totalSeconds = getInputSeconds(currentMode);
        remainingSeconds = totalSeconds;
      }
      if (remainingSeconds <= 0) {
        totalSeconds = getInputSeconds(currentMode);
        remainingSeconds = totalSeconds;
      }
      if (totalSeconds === 0) return;

      isRunning = true;
      sessionStartTime = sessionStartTime || new Date();
      body.classList.add('running');
      inputSection.style.opacity = '0.4';
      inputSection.style.pointerEvents = 'none';

      mainBtn.textContent = '⏸ 일시정지';
      timerSub.textContent = currentMode === 'study' ? '집중 중...' : '휴식 중...';

      intervalId = setInterval(() => {
        remainingSeconds--;
        updateDigits(remainingSeconds);
        updateRing(remainingSeconds, totalSeconds);

        if (remainingSeconds <= 0) {
          clearInterval(intervalId);
          intervalId = null;
          isRunning = false;
          body.classList.remove('running');
          onTimerEnd();
        }
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(intervalId);
      intervalId = null;
      isRunning = false;
      body.classList.remove('running');
      mainBtn.textContent = '▶ 계속하기';
      timerSub.textContent = '일시정지';
    }

    function onTimerEnd() {
      // Vibrate on iOS (won't work on all, but attempt)
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);

      // Log the session
      addLog(currentMode, totalSeconds);

      mainBtn.textContent = '선택 중...';
      timerSub.textContent = '종료!';

      // Show choice overlay
      const label = currentMode === 'study' ? '공부 완료! 다음은?' : '휴식 완료! 다음은?';
      choiceSub.textContent = label;
      setTimeout(() => {
        choiceOverlay.classList.add('visible');
      }, 300);
    }

    function chooseSession(mode) {
      choiceOverlay.classList.remove('visible');

      setTimeout(() => {
        currentMode = mode;
        applyMode(mode);

        totalSeconds = getInputSeconds(mode);
        remainingSeconds = totalSeconds;
        sessionStartTime = null;

        updateDigits(remainingSeconds);
        updateRing(remainingSeconds, totalSeconds);

        inputSection.style.opacity = '1';
        inputSection.style.pointerEvents = 'auto';

        mainBtn.textContent = mode === 'study' ? '▶ 공부 시작' : '▶ 휴식 시작';
        timerSub.textContent = '대기 중';

        // Auto-start
        startTimer();
      }, 300);
    }

    function applyMode(mode) {
      if (mode === 'rest') {
        body.classList.add('rest-mode');
        modeLabel.textContent = '휴식 모드';
      } else {
        body.classList.remove('rest-mode');
        modeLabel.textContent = '공부 모드';
      }
    }

    function handleReset() {
      clearInterval(intervalId);
      intervalId = null;
      isRunning = false;
      currentMode = 'study';
      sessionStartTime = null;

      body.classList.remove('running', 'rest-mode');
      applyMode('study');
      choiceOverlay.classList.remove('visible');

      totalSeconds = getInputSeconds('study');
      remainingSeconds = totalSeconds;

      updateDigits(remainingSeconds);
      updateRing(remainingSeconds, totalSeconds);

      inputSection.style.opacity = '1';
      inputSection.style.pointerEvents = 'auto';

      mainBtn.textContent = '▶ 공부 시작';
      timerSub.textContent = '대기 중';
    }

    // ─── Session log ─────────────────────────────────────────
    function addLog(mode, secs) {
      const now = new Date();
      const h = String(now.getHours()).padStart(2,'0');
      const m = String(now.getMinutes()).padStart(2,'0');
      const durMin = Math.floor(secs / 60);
      const durSec = secs % 60;
      const label = mode === 'study' ? '공부' : '휴식';
      sessionLog.unshift({ mode, label, time: `${h}:${m}`, duration: `${durMin}분 ${durSec > 0 ? durSec + '초' : ''}` });
      renderLog();
    }

    function renderLog() {
      if (sessionLog.length === 0) {
        logList.innerHTML = '<div class="log-empty">아직 기록이 없어요</div>';
        return;
      }
      logList.innerHTML = sessionLog.map(item => `
        <div class="log-item">
          <div class="log-left">
            <div class="log-dot ${item.mode}"></div>
            <span>${item.label} · ${item.duration.trim()}</span>
          </div>
          <span>${item.time}</span>
        </div>
      `).join('');
    }

    // ─── Prevent sleep on iOS (best effort) ──────────────────
    // iOS doesn't allow true wake lock, but we keep a dummy audio context
    let audioCtx = null;
    function keepAwake() {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        gainNode.gain.value = 0; // silent
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
      } catch(e) {}
    }

    // Trigger on first touch
    document.addEventListener('touchstart', () => {
      if (!audioCtx) keepAwake();
    }, { once: true });
  </script>
</body>
